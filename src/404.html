<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SendMail</title>
  <script>
    // GitHub Pages SPA routing fix.
    // When GitHub Pages 404s on a deep link like /send-mail/inbox,
    // this script encodes the path into the query string and redirects
    // to index.html, which the redirect handler below picks back up.
    var l = window.location;
    var isProjectPage = l.hostname.endsWith('.github.io') && l.pathname.startsWith('/send-mail/');
    var segmentCount = isProjectPage ? 1 : 0;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
